<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Teaching Agent Viewer</title>
  <link rel="stylesheet" href="/static/css/viewer.css?v=20260321b">
</head>
<body>
  <main class="viewer-shell">
    <header class="viewer-header">
      <div>
        <span class="viewer-kicker">Preview Viewer</span>
        <h1 id="viewerTitle">等待预览内容</h1>
        <p id="viewerMeta">工作台会把低保真预览或 SVG 中间稿发送到这里。</p>
      </div>
      <span id="viewerModeBadge" class="viewer-badge">EMPTY</span>
    </header>
    <section class="viewer-stage-wrap">
      <div id="viewerEmptyState" class="viewer-empty">等待工作台推送预览内容。</div>
      <div id="viewerStage" class="viewer-stage" hidden></div>
      <iframe id="viewerHtmlFrame" class="viewer-frame" title="Viewer HTML Frame" hidden></iframe>
    </section>
  </main>
  <script src="/static/js/viewer.js?v=20260321b"></script>
</body>
</html>
