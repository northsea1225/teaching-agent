<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多模态教学助手</title>
    <style>
        /* --- 基础样式 --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; height: 100vh; background-color: #f7f7f8; overflow: hidden; }

        /* --- 侧边栏 --- */
        .sidebar { width: 260px; background-color: #202123; color: white; display: flex; flex-direction: column; padding: 10px; }
        .new-chat-btn { background-color: #10a37f; color: white; border: none; border-radius: 4px; padding: 12px; font-size: 14px; font-weight: bold; cursor: pointer; margin-bottom: 20px; transition: background 0.2s; }
        .new-chat-btn:hover { background-color: #0d8c6c; }
        .history-list { flex: 1; overflow-y: auto; }
        .history-item { padding: 10px 12px; margin-bottom: 4px; border-radius: 4px; font-size: 14px; cursor: pointer; color: #dcdcdc; }
        .history-item:hover { background-color: #2f3133; }

        /* --- 主聊天区 --- */
        .main-content { flex: 1; display: flex; flex-direction: column; background-color: white; }
        .chat-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        
        /* 消息气泡 */
        .message { max-width: 80%; padding: 12px 16px; border-radius: 8px; line-height: 1.6; font-size: 14px; white-space: pre-wrap; }
        .user-message { background-color: #e1ffc1; align-self: flex-end; }
        .bot-message { background-color: #f0f0f0; align-self: flex-start; }

        /* 输入框区域 */
        .input-area { padding: 15px; background-color: white; border-top: 1px solid #e0e0e0; display: flex; gap: 10px; }
        .input-textarea { flex: 1; padding: 12px 16px; border: 1px solid #d1d5da; border-radius: 8px; font-size: 14px; resize: none; outline: none; max-height: 200px; overflow-y: auto; }
        .send-btn { background-color: #10a37f; color: white; border: none; border-radius: 8px; padding: 0 20px; font-weight: bold; cursor: pointer; }
        .send-btn:hover { background-color: #0d8c6c; }
        .send-btn:disabled { background-color: #999; cursor: not-allowed; }

        /* 加载动画 */
        .loading { display: flex; gap: 4px; }
        .loading-dot { width: 8px; height: 8px; border-radius: 50%; background-color: #333; animation: pulse 1.5s infinite ease-in-out; }
        .loading-dot:nth-child(2) { animation-delay: 0.2s; }
        .loading-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse { 0%, 80%, 100% { transform: scale(1); opacity: 1; } 40% { transform: scale(1.2); opacity: 0.6; } }
        
        .welcome { text-align: center; margin-top: 50px; color: #666; }
        .welcome h2 { margin-bottom: 10px; color: #333; }
    </style>
</head>
<body>
    <!-- 侧边栏 -->
    <div class="sidebar">
        <button class="new-chat-btn" onclick="startNewChat()">+ 新对话</button>
        <div class="history-list" id="chat-history">
            <div class="history-item"><span>💬</span> 当前对话</div>
        </div>
    </div>

    <!-- 主界面 -->
    <div class="main-content">
        <div class="chat-container" id="chat-container">
            <div class="welcome">
                <h2>多模态教学助手</h2>
                <p>请输入您的问题，我将为您提供帮助</p>
            </div>
        </div>

        <div class="input-area">
            <textarea class="input-textarea" id="user-input" placeholder="输入您的问题..." rows="1"></textarea>
            <button class="send-btn" id="send-btn" onclick="sendMessage()">发送</button>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        
        // 当前会话ID，初始为空
        let currentSessionId = null;

        // 自动调整输入框高度
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = this.scrollHeight + 'px';
        });

        // 发送消息
        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            // 1. 显示用户消息
            addMessageToUI(message, 'user');
            userInput.value = '';
            userInput.style.height = 'auto';

            // 2. 显示加载中
            const loadingId = showLoading();
            sendBtn.disabled = true;

            try {
                // 3. 调用后端接口
                const response = await fetch('/api/chat/messages', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        content: message,           // 必填：用户输入
                        session_id: currentSessionId, // 选填：当前会话ID
                        title: "新对话",            // 必填：如果是新会话，给个标题
                        use_web_search: false       // 选填：暂时设为false
                    })
                });

                if (!response.ok) throw new Error('Network response was not ok');

                const data = await response.json();

                // 4. 移除加载动画
                removeLoading(loadingId);

                // 5. 处理返回数据 (关键修改点)
                currentSessionId = data.session_id; // 保存会话ID
                
                // 这里改了！后端返回的是 assistant_message
                const botReply = data.assistant_message; 
                
                addMessageToUI(botReply, 'bot');

            } catch (error) {
                console.error('请求失败:', error);
                removeLoading(loadingId);
                addMessageToUI("网络错误，请检查后端服务是否启动。", 'bot');
            } finally {
                sendBtn.disabled = false;
            }
        }

        // 添加消息到界面
        function addMessageToUI(text, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}-message`;
            messageDiv.textContent = text;
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // 显示加载动画
        function showLoading() {
            const id = 'loading-' + Date.now();
            const div = document.createElement('div');
            div.id = id;
            div.className = 'message bot-message';
            div.innerHTML = '<div class="loading"><span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span></div>';
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return id;
        }

        // 移除加载动画
        function removeLoading(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        // 开始新对话
        function startNewChat() {
            currentSessionId = null; // 重置ID
            chatContainer.innerHTML = '<div class="welcome"><h2>多模态教学助手</h2><p>请输入您的问题，我将为您提供帮助</p></div>';
        }

        // 回车发送
        userInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
